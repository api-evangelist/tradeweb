aid: tradeweb
name: Tradeweb
description: Tradeweb Markets is a leading global operator of electronic marketplaces
  for rates, credit, equities, and money markets. The platform provides APIs for electronic
  trading execution, straight-through processing, market data, trade reporting, and
  integration with order management and risk systems across more than 40 fixed income
  and derivatives products.
type: Index
