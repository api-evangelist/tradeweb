common:
- type: Portal
  url: https://www.tradeweb.com/
- type: Documentation
  url: https://www.tradeweb.com/our-markets/institutional/integration/
- type: Support
  url: https://www.tradeweb.com/contact/
- type: Blog
  url: https://www.tradeweb.com/newsroom/media-center/insights/
- type: TermsOfService
  url: https://www.tradeweb.com/terms-of-use/
- type: PrivacyPolicy
  url: https://www.tradeweb.com/privacy-policy/
- type: Features
  data:
  - name: Request for Quote (RFQ)
    description: Send RFQs to multiple dealers simultaneously for competitive pricing
      on fixed income and derivatives.
  - name: Automated Intelligent Execution (AiEX)
    description: Automated trade execution with pre-defined rules for straight-through
      processing.
  - name: Click-to-Trade
    description: One-click trade execution on streaming dealer prices.
  - name: Market Data
    description: Real-time and historical pricing data across 20+ asset classes as
      an independent benchmark source.
  - name: Trade Reporting (APA)
    description: MiFID II compliant post-trade transparency reporting via Approved
      Publication Arrangement.
  - name: Straight-Through Processing
    description: Automated post-trade processing from execution to settlement with
      STP vendor integration.
  - name: Python API
    description: Direct connection between Python trading models and Tradeweb execution.
  - name: FIX Connectivity
    description: Industry-standard FIX protocol integration with OMS, EMS, and risk
      systems.
  - name: Multi-Asset Coverage
    description: Trading across rates, credit, equities, ETFs, and money markets on
      a single platform.
  - name: Pre-Trade Analytics
    description: Transaction cost analysis and liquidity analytics before trade execution.
- type: UseCases
  data:
  - name: Institutional Fixed Income Trading
    description: Execute government bond, corporate bond, and municipal bond trades
      electronically.
  - name: Derivatives Execution
    description: Trade interest rate swaps, credit default swaps, and other OTC derivatives.
  - name: ETF Trading
    description: Access institutional ETF liquidity with RFQ and portfolio trading
      workflows.
  - name: Algorithmic Trading
    description: Connect Python-based algo strategies directly to Tradeweb execution
      via API.
  - name: OMS Integration
    description: Integrate Tradeweb execution with order management and portfolio
      management systems.
  - name: Regulatory Reporting
    description: Meet MiFID II post-trade transparency requirements via APA trade
      reporting.
  - name: Market Data Analytics
    description: Access independent OTC pricing data for valuation, risk, and compliance.
  - name: Treasury Management
    description: Execute US Treasury and government bond trades across CLOB and RFQ
      protocols.
- type: Solutions
  data:
  - name: Tradeweb Institutional
    description: Electronic marketplace for buy-side institutional trading across
      fixed income and derivatives.
  - name: Tradeweb Wholesale (Dealerweb)
    description: Inter-dealer marketplace for wholesale fixed income and derivatives
      trading.
  - name: Tradeweb Retail
    description: Electronic marketplace for retail-sized fixed income trading.
  - name: Tradeweb Data & Analytics
    description: Market data, pricing, and analytics services including APA trade
      reporting.
