apis:
- aid: tradeweb:trading-api
  name: Tradeweb Trading API
  description: Electronic trading API for executing trades across fixed income, derivatives,
    and ETF markets. Supports RFQ (Request for Quote), click-to-trade, and automated
    execution via AiEX (Automated Intelligent Execution) workflows.
  humanURL: https://www.tradeweb.com/our-markets/institutional/integration/
  baseURL: https://api.tradeweb.com
  tags:
  - Electronic Trading
  - Execution
  - Fixed Income
  - RFQ
  properties:
  - type: Documentation
    url: https://www.tradeweb.com/our-markets/institutional/integration/
- aid: tradeweb:python-api
  name: Tradeweb Python API
  description: Python API enabling seamless integration between trading strategies
    and Tradeweb execution. Allows direct connection between Python-coded trading
    models and Tradeweb for solicited workflows and Automated Intelligent Execution
    (AiEX).
  humanURL: https://www.tradeweb.com/our-markets/institutional/integration/
  baseURL: https://api.tradeweb.com
  tags:
  - Automation
  - Python
  - Quantitative Trading
  - SDK
  properties:
  - type: Documentation
    url: https://www.tradeweb.com/our-markets/institutional/integration/
- aid: tradeweb:fix-api
  name: Tradeweb FIX API
  description: FIX protocol connectivity for electronic trading integration with order
    management systems, risk systems, and third-party trading platforms. Industry-standard
    FIX messaging for trade execution and straight-through processing.
  humanURL: https://www.tradeweb.com/our-markets/institutional/integration/
  baseURL: fix://tradeweb.com
  tags:
  - FIX Protocol
  - Integration
  - OMS
  - STP
  properties:
  - type: Documentation
    url: https://www.tradeweb.com/our-markets/institutional/integration/
- aid: tradeweb:market-data-api
  name: Tradeweb Market Data API
  description: Real-time and historical market data API providing independent pricing
    information and benchmark OTC pricing data across more than 20 asset classes including
    government bonds, credit, swaps, and ETFs.
  humanURL: https://www.lseg.com/en/data-analytics/financial-data/pricing-and-market-data/fixed-income-pricing-data/tradeweb-data
  baseURL: https://api.tradeweb.com/data
  tags:
  - Benchmark Data
  - Market Data
  - OTC Pricing
  - Real-Time Data
  properties:
  - type: Documentation
    url: https://www.lseg.com/en/data-analytics/financial-data/pricing-and-market-data/fixed-income-pricing-data/tradeweb-data
- aid: tradeweb:apa-api
  name: Tradeweb APA Trade Reporting API
  description: Approved Publication Arrangement (APA) API enabling market participants
    to meet MiFID II post-trade transparency requirements. Supports real-time trade
    reporting across all mandated instrument classes.
  humanURL: https://www.tradeweb.com/our-markets/data-analytics/trade-reporting-services-apa/
  baseURL: https://apa.tradeweb.com/api
  tags:
  - APA
